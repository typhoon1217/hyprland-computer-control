# Minimal Hyprland config for the headless sandbox.
# start.sh substitutes @RESOLUTION@ at runtime.

# Nested mode — single virtual monitor sized to the parent toplevel that
# Aquamarine creates. Resolution is a hint; the actual size is dictated by
# the parent compositor's configure events.
monitor = , @RESOLUTION@, auto, 1

input {
    follow_mouse = 1
}

general {
    border_size = 1
    gaps_in = 0
    gaps_out = 0
}

decoration {
    rounding = 0
}

animations {
    enabled = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# Keep stdout logs enabled so start.sh can surface boot errors.
debug {
    disable_logs = false
    enable_stdout_logs = true
}

# No exec-once: the user's autostart should not run in the sandbox.
# Apps are launched explicitly via cc-run.sh.
